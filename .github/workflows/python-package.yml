# CI: lint, type-check, and test the Python backend and Vue frontend
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: 'requirements.txt'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install flake8

    - name: Set up NLTK data
      run: python setup_models.py

    - name: Lint with flake8
      run: |
        # Syntax errors and undefined names (fatal)
        flake8 metascan/ backend/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Style warnings (non-fatal)
        flake8 metascan/ backend/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Format check with black
      run: |
        black --check metascan/ backend/ tests/

    - name: Type check with mypy
      run: |
        mypy --check-untyped-defs metascan/

    - name: Test with pytest
      run: pytest

  frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Type check
      run: |
        cd frontend
        npx vue-tsc --noEmit

    - name: Build
      run: |
        cd frontend
        npm run build
