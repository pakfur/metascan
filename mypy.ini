[mypy]
# Global options — matches setup.py python_requires=">=3.11,<3.13"
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True

# Handle missing imports
ignore_missing_imports = True

# Third-party libraries without stubs
[mypy-nltk.*]
ignore_missing_imports = True

[mypy-ffmpeg.*]
ignore_missing_imports = True

[mypy-watchdog.*]
ignore_missing_imports = True

# Legacy PyQt UI code — skip type checking (being replaced by Vue frontend)
[mypy-metascan.ui.*]
ignore_errors = True

# Strict checking for core modules
[mypy-metascan.core.*]
disallow_untyped_defs = True
